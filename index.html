<!DOCTYPE html>

<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Rose Bag</title>

<style>
body { font-family: Arial; background-color: #fff0f5; margin:0; text-align:center; }

/* تسجيل الدخول */
#loginPage {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}
#loginPage input {
  padding:10px;
  margin:5px;
  width:200px;
}
#loginPage button {
  padding:10px 20px;
  margin-top:10px;
  background-color:#d63384;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
#loginError { color:red; margin-top:5px; }

/* Splash */
#splash {
  position:fixed;
  width:100%;
  height:100%;
  background:#fff0f5;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  display:none;
}
#splashLogo {
  width:200px;
  transition: transform 3s ease;
}
#splash.show #splashLogo {
  transform:scale(1.5);
}

/* المنتجات */
header { background-color:#d63384; color:white; padding:20px; font-size:30px; }
#productsContainer { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:20px; padding:20px; }
.product { background:white; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); padding:15px; }
.gallery { display:grid; grid-template-columns:repeat(2,1fr); gap:5px; }
.gallery img { width:100%; height:100px; object-fit:cover; border-radius:10px; cursor:pointer; }
.colors { margin:10px 0; }
.color { width:20px; height:20px; display:inline-block; border-radius:50%; cursor:pointer; border:2px solid #fff; margin:2px; }

button {
  background-color:#d63384;
  color:white;
  border:none;
  padding:10px;
  border-radius:5px;
  cursor:pointer;
}

.footer { margin-top:30px; padding:20px; background:#d63384; color:white; }

/* Modal */
.modal { display:none; position:fixed; z-index:1000; width:100%; height:100%; background:rgba(0,0,0,0.8); }
.modal img { display:block; margin:auto; max-width:80%; max-height:80%; margin-top:60px; }
#closeModal { position:absolute; top:10px; right:20px; font-size:30px; color:white; cursor:pointer; }
#prev,#next { position:absolute; top:50%; font-size:40px; color:white; cursor:pointer; }
#prev { left:10px; }
#next { right:10px; }
</style>

</head>

<body>

<!-- تسجيل الدخول -->

<div id="loginPage">
  <h2>تسجيل الدخول</h2>
  <input type="email" id="email" placeholder="ادخلي الإيميل">
  <input type="password" id="password" placeholder="كلمة المرور">
  <button onclick="login()">دخول</button>
  <p id="loginError"></p>
</div>

<!-- سبلاش -->

<div id="splash">
  <img src="logo.jpg" id="splashLogo">
</div>

<!-- المنتجات -->

<header>🌸 Rose Bag 🌸</header>
<h2>أهلا وسهلاً</h2>
<div id="productsContainer"></div>
<div class="footer">📞 للتواصل واتساب: 201080167099</div>

<!-- Modal -->

<div id="myModal" class="modal">
  <span id="closeModal">&times;</span>
  <span id="prev">&#10094;</span>
  <span id="next">&#10095;</span>
  <img id="modalImg">
</div>

<script>

const products = [
 {id:1,colors:["black","red","blue"]},
 {id:2,colors:["white","pink","black"]},
 {id:3,colors:["brown","black","beige"]}
];

let currentImages=[],currentIndex=0;

// فتح الصور
function openImageGallery(images,i){
  currentImages=images;
  currentIndex=i;
  document.getElementById("myModal").style.display="block";
  document.getElementById("modalImg").src=images[i];
}

// تغيير اللون
function changeColor(id,color){
  let gallery=document.querySelector(`#product${id} .gallery`);
  let imgs=[
    `bag${id}_${color}_front.jpg`,
    `bag${id}_${color}_side.jpg`,
    `bag${id}_${color}_back.jpg`,
    `bag${id}_${color}_open.jpg`
  ];
  gallery.innerHTML=imgs.map((img,i)=>`<img src="${img}" onclick="openImageGallery(${JSON.stringify(imgs)},${i})">`).join("");
}

// تسجيل الدخول بالإيميل
function login(){
  let email=document.getElementById("email").value.trim();
  let pass=document.getElementById("password").value.trim();
  let error=document.getElementById("loginError");

  let pattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

  if(!pattern.test(email)){
    error.textContent="اكتبي إيميل صحيح";
    return;
  }

  if(pass.length<4){
    error.textContent="كلمة المرور ضعيفة";
    return;
  }

  document.getElementById("loginPage").style.display="none";

  let splash=document.getElementById("splash");
  splash.style.display="flex";
  splash.classList.add("show");

  setTimeout(()=>{
    splash.style.display="none";
    loadProducts();
  },3000);
}

// تحميل المنتجات
function loadProducts(){
  let c=document.getElementById("productsContainer");
  c.innerHTML="";

  products.forEach(p=>{
    let color=p.colors[0];

    let imgs=[
      `bag${p.id}_${color}_front.jpg`,
      `bag${p.id}_${color}_side.jpg`,
      `bag${p.id}_${color}_back.jpg`,
      `bag${p.id}_${color}_open.jpg`
    ];

    c.innerHTML+=`
    <div class="product" id="product${p.id}">
      <div class="gallery">
        ${imgs.map((img,i)=>`<img src="${img}" onclick="openImageGallery(${JSON.stringify(imgs)},${i})">`).join("")}
      </div>

      <div class="colors">
        ${p.colors.map(c=>`<span class="color" style="background:${c}" onclick="changeColor(${p.id},'${c}')"></span>`).join("")}
      </div>

      <h3>شنطة ${p.id}</h3>
      <p>السعر: ${200+p.id*10} جنيه</p>

      <a href="https://wa.me/201080167099">
        <button>اطلب الآن</button>
      </a>
    </div>`;
  });
}

// المودال
document.getElementById("closeModal").onclick=()=>document.getElementById("myModal").style.display="none";
document.getElementById("prev").onclick=()=>{currentIndex=(currentIndex-1+currentImages.length)%currentImages.length;document.getElementById("modalImg").src=currentImages[currentIndex];}
document.getElementById("next").onclick=()=>{currentIndex=(currentIndex+1)%currentImages.length;document.getElementById("modalImg").src=currentImages[currentIndex];}

</script>

</body>
</html>
