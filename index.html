<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Rose Bag</title>
<style>
body { font-family: Arial; background-color: #fff0f5; margin:0; text-align:center; }

/* صفحات تسجيل الدخول والتسجيل */
#loginPage, #registerPage { position:fixed; width:100%; height:100%; background:#fff0f5; display:flex; justify-content:center; align-items:center; z-index:9999; }
.box { background:white; padding:30px; border-radius:15px; width:300px; box-shadow:0 4px 15px rgba(0,0,0,0.2); }
input { width:90%; padding:10px; margin:10px 0; }
button { background-color:#d63384; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer; margin-top:10px; }

/* تغيير اللغة */
#langBtn { position:absolute; top:10px; left:10px; padding:5px 10px; border-radius:5px; }

/* الموقع */
#mainSite { display:none; }
header { background-color:#d63384; color:white; padding:20px; font-size:30px; }
#productsContainer { display:grid; grid-template-columns:1fr; gap:20px; padding:20px; } /* عمود واحد للصور طولياً */
.product { background:white; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); padding:15px; transition:0.3s; }
.gallery { display:flex; flex-direction:column; gap:5px; } /* الصور طولياً */
.gallery img { width:100%; height:150px; object-fit:cover; border-radius:10px; cursor:pointer; transition:0.3s; }
.colors { margin:10px 0; }
.color { width:20px; height:20px; display:inline-block; border-radius:50%; cursor:pointer; border:2px solid #fff; margin:2px; }
.active-color { border-color:#000; }

.footer { margin-top:30px; padding:20px; background:#d63384; color:white; }

/* Modal */
.modal { display:none; position:fixed; z-index:1000; padding-top:60px; left:0; top:0; width:100%; height:100%; background-color: rgba(0,0,0,0.8); }
.modal img { display:block; margin:auto; max-width:80%; max-height:80%; border-radius:10px; }
#closeModal { position:absolute; top:10px; right:20px; font-size:30px; color:white; cursor:pointer; }
#prev,#next { position:absolute; top:50%; transform:translateY(-50%); font-size:40px; color:white; cursor:pointer; padding:10px; user-select:none; }
#prev { left:10px; } #next { right:10px; }

/* Splash */
#splash { position:fixed; width:100%; height:100%; background:#fff0f5; display:flex; align-items:center; justify-content:center; z-index:500; }
#splashLogo { width:200px; transition: transform 4s ease; }
#splash.show #splashLogo { transform:scale(1.5); }
</style>
</head>
<body>

<!-- زر تغيير اللغة -->
<button id="langBtn" onclick="toggleLang()">EN</button>

<!-- Splash -->
<div id="splash"><img src="logo.jpg" id="splashLogo"></div>

<!-- تسجيل الدخول -->
<div id="loginPage">
  <div class="box">
    <h2 id="loginTitle">تسجيل الدخول</h2>
    <input type="text" id="usernameLogin" placeholder="اسم المستخدم"><br>
    <input type="password" id="passwordLogin" placeholder="كلمة المرور"><br>
    <button onclick="login()">دخول</button>
    <p id="loginError" style="color:red;"></p>
    <p><a href="#" onclick="showRegister()">تسجيل جديد</a></p>
  </div>
</div>

<!-- تسجيل جديد -->
<div id="registerPage" style="display:none;">
  <div class="box">
    <h2 id="registerTitle">تسجيل جديد</h2>
    <input type="text" id="usernameReg" placeholder="اسم المستخدم"><br>
    <input type="password" id="passwordReg" placeholder="كلمة المرور"><br>
    <button onclick="register()">سجل</button>
    <p id="regError" style="color:red;"></p>
    <p><a href="#" onclick="showLogin()">رجوع لتسجيل الدخول</a></p>
  </div>
</div>

<!-- الموقع -->
<div id="mainSite">
<header>🌸 Rose Bag 🌸</header>
<h2 id="welcomeText">أهلا وسهلاً </h2>
<div id="productsContainer"></div>
<div class="footer">📞 للتواصل واتساب: 201080167099</div>
</div>

<!-- Modal -->
<div id="myModal" class="modal">
  <span id="closeModal">&times;</span>
  <span id="prev">&#10094;</span>
  <span id="next">&#10095;</span>
  <img id="modalImg">
</div>

<script>
// اللغة
let lang = "ar";
function toggleLang(){
  lang = (lang==="ar")?"en":"ar";
  document.getElementById("loginTitle").innerText=(lang==="ar")?"تسجيل الدخول":"Login";
  document.getElementById("registerTitle").innerText=(lang==="ar")?"تسجيل جديد":"Register";
  document.getElementById("welcomeText").innerText=(lang==="ar")?"أهلا وسهلاً":"Welcome";
  document.getElementById("langBtn").innerText=(lang==="ar")?"EN":"AR";
}

// بيانات وهمية للمستخدمين
let users = JSON.parse(localStorage.getItem("users") || "[]");

// تبديل الصفحات
function showRegister(){ document.getElementById("loginPage").style.display="none"; document.getElementById("registerPage").style.display="flex"; }
function showLogin(){ document.getElementById("registerPage").style.display="none"; document.getElementById("loginPage").style.display="flex"; }

// تسجيل دخول
function login(){
  let user=document.getElementById("usernameLogin").value.trim();
  let pass=document.getElementById("passwordLogin").value.trim();
  let found = users.find(u=>u.username===user && u.password===pass);
  if(found){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("registerPage").style.display="none";
    document.getElementById("splash").style.display="none";
    document.getElementById("mainSite").style.display="block";
    loadProducts();
  }else{
    document.getElementById("loginError").innerText=(lang==="ar")?"بيانات خاطئة":"Wrong data";
  }
}

// تسجيل جديد
function register(){
  let user=document.getElementById("usernameReg").value.trim();
  let pass=document.getElementById("passwordReg").value.trim();
  if(!user||!pass){ document.getElementById("regError").innerText=(lang==="ar")?"ادخلي كل الحقول":"Enter all fields"; return;}
  if(users.find(u=>u.username===user)){ document.getElementById("regError").innerText=(lang==="ar")?"اسم المستخدم موجود بالفعل":"Username exists"; return;}
  users.push({username:user,password:pass});
  localStorage.setItem("users",JSON.stringify(users));
  document.getElementById("usernameLogin").value=user;
  document.getElementById("passwordLogin").value=pass;
  login();
}

// المنتجات
const products = [
    {id:1, colors:["black","red","blue"]},{id:2, colors:["black","white","red"]},{id:3, colors:["brown","black","beige"]},
    {id:4, colors:["black","red","pink"]},{id:5, colors:["blue","white","pink"]},{id:6, colors:["black","gray","brown"]},
    {id:7, colors:["red","pink","white"]},{id:8, colors:["black","brown","beige"]},{id:9, colors:["blue","gray","black"]},
    {id:10, colors:["pink","white","red"]}
];

let currentImages=[], currentIndex=0;

function openImageGallery(images,index){currentImages=images; currentIndex=index; document.getElementById("myModal").style.display="block"; document.getElementById("modalImg").src=currentImages[currentIndex];}
function changeColor(productId,color){ const gallery=document.querySelector(`#product${productId} .gallery`); const images=[`bag${productId}_${color}_front.jpg`,`bag${productId}_${color}_side.jpg`,`bag${productId}_${color}_back.jpg`,`bag${productId}_${color}_open.jpg`]; gallery.innerHTML=images.map((img,i)=>`<img src="${img}" onclick="openImageGallery(${JSON.stringify(images)},${i})">`).join(""); const colorSpans=document.querySelectorAll(`#colors${productId} .color`); colorSpans.forEach(span=>{span.classList.remove("active-color"); if(span.style.backgroundColor===color) span.classList.add("active-color");});}

// أسهم المودال
document.getElementById("prev").onclick=function(e){e.stopPropagation(); currentIndex=(currentIndex-1+currentImages.length)%currentImages.length; document.getElementById("modalImg").src=currentImages[currentIndex];}
document.getElementById("next").onclick=function(e){e.stopPropagation(); currentIndex=(currentIndex+1)%currentImages.length; document.getElementById("modalImg").src=currentImages[currentIndex];}
document.getElementById("closeModal").onclick=function(){document.getElementById("myModal").style.display="none";}
document.getElementById("modalImg").onclick=function(e){e.stopPropagation();}

// تحميل المنتجات
function loadProducts(){
    const container=document.getElementById("productsContainer");
    container.innerHTML="";
    products.forEach(p=>{
        const defaultColor=p.colors[0];
        const images=[`bag${p.id}_${defaultColor}_front.jpg`,`bag${p.id}_${defaultColor}_side.jpg`,`bag${p.id}_${defaultColor}_back.jpg`,`bag${p.id}_${defaultColor}_open.jpg`];
        container.innerHTML+=`
        <div class="product" id="product${p.id}">
            <div class="gallery">${images.map((img,i)=>`<img src="${img}" onclick='openImageGallery(${JSON.stringify(images)},${i})'>`).join("")}</div>
            <div class="colors" id="colors${p.id}">${p.colors.map((c,index)=>`<span class="color ${index===0?'active-color':''}" style="background:${c}" onclick="changeColor(${p.id},'${c}')"></span>`).join("")}</div>
            <h3>شنطة ${p.id}</h3>
            <p>السعر: ${200+p.id*10} جنيه</p>
            <a href="https://wa.me/201080167099?text=عايزة%20اطلب%20شنطة%20${p.id}"><button>اطلب الآن</button></a>
        </div>`;
    });
}

// Splash عند تحميل الموقع
window.onload=function(){document.getElementById("splash").classList.add("show"); setTimeout(()=>{document.getElementById("splash").style.display="none";},4000);}
</script>

</body>
</html>
