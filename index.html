<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Rose Bag</title>
<style>
body { font-family: Arial; background-color: #fff0f5; margin:0; text-align:center; }

/* تسجيل الدخول */
#loginPage {
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}
#loginPage input, #loginPage select {
  padding:10px;
  margin:5px;
  width:200px;
}
#loginPage button {
  padding:10px 20px;
  margin-top:10px;
  background-color:#d63384;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
#loginError { color:red; }

/* Splash */
#splash {
  position:fixed;
  width:100%;
  height:100%;
  background:#fff0f5;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
#splashLogo {
  width:200px;
  transition: transform 4s ease;
}
#splash.show #splashLogo {
  transform:scale(1.5);
}

/* المنتجات */
header { background-color:#d63384; color:white; padding:20px; font-size:30px; display:none; }
#welcome { display:none; }

#productsContainer {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
  gap:20px;
  padding:20px;
}
.product { background:white; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); padding:15px; }
.gallery { display:grid; grid-template-columns:repeat(2,1fr); gap:5px; }
.gallery img { width:100%; height:100px; object-fit:cover; border-radius:10px; cursor:pointer; }

.colors { margin:10px 0; }
.color { width:20px; height:20px; display:inline-block; border-radius:50%; cursor:pointer; border:2px solid #fff; margin:2px; }

button { background-color:#d63384; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer; }

.footer { margin-top:30px; padding:20px; background:#d63384; color:white; display:none; }

/* Modal */
.modal { display:none; position:fixed; width:100%; height:100%; background:rgba(0,0,0,0.8); }
.modal img { display:block; margin:auto; max-width:80%; max-height:80%; margin-top:60px; }
#closeModal { position:absolute; top:10px; right:20px; font-size:30px; color:white; cursor:pointer; }
#prev,#next { position:absolute; top:50%; font-size:40px; color:white; cursor:pointer; }
#prev { left:10px; }
#next { right:10px; }

</style>
</head>

<body>

<!-- سبلاش -->
<div id="splash">
  <img src="logo.jpg" id="splashLogo">
</div>

<!-- تسجيل الدخول -->
<div id="loginPage">
  <h2 id="loginTitle">تسجيل الدخول</h2>
  
  <!-- اختيار اللغة -->
  <select id="langSelect" onchange="changeLanguage()">
    <option value="ar">العربية</option>
    <option value="en">English</option>
  </select>

  <input type="email" id="email" placeholder="ادخلي الإيميل">
  <input type="password" id="password" placeholder="كلمة المرور">
  <button onclick="login()" id="loginBtn">دخول</button>
  <p id="loginError"></p>
</div>

<!-- المنتجات -->
<header id="mainHeader">🌸 Rose Bag 🌸</header>
<h2 id="welcome">أهلا وسهلاً</h2>

<div id="productsContainer"></div>

<div class="footer" id="footer">📞 واتساب: 201080167099</div>

<!-- Modal -->
<div id="myModal" class="modal">
  <span id="closeModal">&times;</span>
  <span id="prev">&#10094;</span>
  <span id="next">&#10095;</span>
  <img id="modalImg">
</div>

<script>
const texts = {
    ar: {
        loginTitle: "تسجيل الدخول",
        email: "ادخلي الإيميل",
        password: "كلمة المرور",
        loginBtn: "دخول",
        errorEmail: "اكتبي إيميل صحيح",
        errorPass: "كلمة المرور ضعيفة",
        welcome: "أهلا وسهلاً"
    },
    en: {
        loginTitle: "Login",
        email: "Enter email",
        password: "Password",
        loginBtn: "Login",
        errorEmail: "Enter valid email",
        errorPass: "Password too short",
        welcome: "Welcome"
    }
};

let currentLang = 'ar';
let currentImages = [];
let currentIndex = 0;

window.onload = function(){
    let splash = document.getElementById("splash");
    splash.classList.add("show");

    setTimeout(()=>{
        splash.style.display="none";
        document.getElementById("loginPage").style.display="flex";
        changeLanguage();
    },4000);
};

// تغيير اللغة
function changeLanguage(){
    currentLang = document.getElementById("langSelect").value;
    document.getElementById("loginTitle").textContent = texts[currentLang].loginTitle;
    document.getElementById("email").placeholder = texts[currentLang].email;
    document.getElementById("password").placeholder = texts[currentLang].password;
    document.getElementById("loginBtn").textContent = texts[currentLang].loginBtn;
    document.getElementById("loginError").textContent = "";
}

// تسجيل الدخول
function login(){
    let email = document.getElementById("email").value.trim();
    let pass = document.getElementById("password").value.trim();
    let error = document.getElementById("loginError");

    let pattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if(!pattern.test(email)){
        error.textContent = texts[currentLang].errorEmail;
        return;
    }

    if(pass.length < 4){
        error.textContent = texts[currentLang].errorPass;
        return;
    }

    document.getElementById("loginPage").style.display="none";
    document.getElementById("mainHeader").style.display="block";
    document.getElementById("welcome").style.display="block";
    document.getElementById("welcome").textContent = texts[currentLang].welcome;
    document.getElementById("footer").style.display="block";

    loadProducts();
}

// عرض الصور
function openImageGallery(images, index){
    currentImages = images;
    currentIndex = index;
    document.getElementById("myModal").style.display="block";
    document.getElementById("modalImg").src = currentImages[currentIndex];
}

// تغيير اللون
function changeColor(id, color){
    let gallery = document.querySelector(`#product${id} .gallery`);
    let imgs = [
        `bag${id}_${color}_front.jpg`,
        `bag${id}_${color}_side.jpg`,
        `bag${id}_${color}_back.jpg`,
        `bag${id}_${color}_open.jpg`
    ];
    gallery.innerHTML = imgs.map((img,i)=>`<img src="${img}" onclick="openImageGallery(${JSON.stringify(imgs)},${i})">`).join("");
}

// المودال
document.getElementById("closeModal").onclick=()=>document.getElementById("myModal").style.display="none";
document.getElementById("prev").onclick=()=>{currentIndex=(currentIndex-1+currentImages.length)%currentImages.length;document.getElementById("modalImg").src=currentImages[currentIndex];}
document.getElementById("next").onclick=()=>{currentIndex=(currentIndex+1)%currentImages.length;document.getElementById("modalImg").src=currentImages[currentIndex];}

// المنتجات
const products = [
    {id:1, colors:["black","red","blue"]},{id:2, colors:["black","white","red"]},{id:3, colors:["brown","black","beige"]},
    {id:4, colors:["black","red","pink"]},{id:5, colors:["blue","white","pink"]},{id:6, colors:["black","gray","brown"]},
    {id:7, colors:["red","pink","white"]},{id:8, colors:["black","brown","beige"]},{id:9, colors:["blue","gray","black"]},
    {id:10, colors:["pink","white","red"]}
];

function loadProducts(){
    let container = document.getElementById("productsContainer");
    container.innerHTML = "";
    products.forEach(p=>{
        let color = p.colors[0];
        let imgs = [`bag${p.id}_${color}_front.jpg`,`bag${p.id}_${color}_side.jpg`,`bag${p.id}_${color}_back.jpg`,`bag${p.id}_${color}_open.jpg`];
        container.innerHTML += `
        <div class="product" id="product${p.id}">
            <div class="gallery">
                ${imgs.map((img,i)=>`<img src="${img}" onclick='openImageGallery(${JSON.stringify(imgs)},${i})'>`).join("")}
            </div>
            <div class="colors">
                ${p.colors.map(c=>`<span class="color" style="background:${c}" onclick="changeColor(${p.id},'${c}')"></span>`).join("")}
            </div>
            <h3>شنطة ${p.id}</h3>
            <p>السعر: ${200 + p.id*10} جنيه</p>
            <a href="https://wa.me/201080167099"><button>اطلب الآن</button></a>
        </div>`;
    });
}
</script>

</body>
</html>
