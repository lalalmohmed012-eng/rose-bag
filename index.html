<!DOCTYPE html>

<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Rose Bag</title>

<style>
body { font-family: Arial; background-color: #fff0f5; margin:0; text-align:center; }

/* اختيار اللغة */
#languagePage {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}
#languagePage button {
  padding:10px 20px;
  margin:10px;
  background:#d63384;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

/* تسجيل الدخول */
#loginPage {
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}
#loginPage input {
  padding:10px;
  margin:5px;
  width:200px;
}
#loginPage button {
  padding:10px 20px;
  margin-top:10px;
  background-color:#d63384;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
#loginError { color:red; }

/* Splash */
#splash {
  position:fixed;
  width:100%;
  height:100%;
  background:#fff0f5;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  display:none;
}
#splashLogo {
  width:200px;
  transition: transform 3s ease;
}
#splash.show #splashLogo {
  transform:scale(1.5);
}

/* المنتجات */
header { background-color: #d63384; color:white; padding:20px; font-size:30px; }
#productsContainer { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:20px; padding:20px; }
.product { background:white; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); padding:15px; }
.gallery { display:grid; grid-template-columns:repeat(2,1fr); gap:5px; }
.gallery img { width:100%; height:100px; object-fit:cover; border-radius:10px; cursor:pointer; }
.colors { margin:10px 0; }
.color { width:20px; height:20px; display:inline-block; border-radius:50%; cursor:pointer; border:2px solid #fff; margin:2px; }
.active-color { border-color:#000; }

button {
  background-color:#d63384;
  color:white;
  border:none;
  padding:10px;
  border-radius:5px;
  cursor:pointer;
}

.footer { margin-top:30px; padding:20px; background:#d63384; color:white; }

/* Modal */
.modal { display:none; position:fixed; z-index:1000; width:100%; height:100%; background:rgba(0,0,0,0.8); }
.modal img { display:block; margin:auto; max-width:80%; max-height:80%; margin-top:60px; }
#closeModal { position:absolute; top:10px; right:20px; font-size:30px; color:white; cursor:pointer; }
#prev,#next { position:absolute; top:50%; font-size:40px; color:white; cursor:pointer; }
#prev { left:10px; }
#next { right:10px; }
</style>

</head>

<body>

<!-- اختيار اللغة -->

<div id="languagePage">
  <h2>اختاري اللغة</h2>
  <button onclick="setLanguage('ar')">العربية</button>
  <button onclick="setLanguage('en')">English</button>
</div>

<!-- تسجيل الدخول -->

<div id="loginPage">
  <h2 id="loginTitle">تسجيل الدخول</h2>
  <input type="text" id="username" placeholder="اسم المستخدم">
  <input type="password" id="password" placeholder="كلمة المرور">
  <button onclick="login()" id="loginBtn">دخول</button>
  <p id="loginError"></p>
</div>

<!-- سبلاش -->

<div id="splash">
  <img src="logo.jpg" id="splashLogo">
</div>

<!-- المنتجات -->

<header id="mainHeader" style="display:none;">🌸 Rose Bag 🌸</header>
<h2 id="welcomeText" style="display:none;">أهلا وسهلاً</h2>
<div id="productsContainer"></div>
<div class="footer" id="footer" style="display:none;">📞 واتساب: 201080167099</div>

<!-- Modal -->

<div id="myModal" class="modal">
  <span id="closeModal">&times;</span>
  <span id="prev">&#10094;</span>
  <span id="next">&#10095;</span>
  <img id="modalImg">
</div>

<script>
let currentLang = "ar";

/* اختيار اللغة */
function setLanguage(lang){
  currentLang = lang;
  document.getElementById("languagePage").style.display="none";
  document.getElementById("loginPage").style.display="flex";

  if(lang==="en"){
    document.getElementById("loginTitle").textContent="Login";
    document.getElementById("username").placeholder="Username";
    document.getElementById("password").placeholder="Password";
    document.getElementById("loginBtn").textContent="Login";
  }
}

/* تسجيل الدخول */
function login(){
  let u = document.getElementById("username").value;
  let p = document.getElementById("password").value;

  if(u==="user" && p==="1234"){
    document.getElementById("loginPage").style.display="none";

    let splash = document.getElementById("splash");
    splash.style.display="flex";
    splash.classList.add("show");

    setTimeout(()=>{
      splash.style.display="none";

      document.getElementById("mainHeader").style.display="block";
      document.getElementById("welcomeText").style.display="block";
      document.getElementById("footer").style.display="block";

      loadProducts();

      if(currentLang==="en"){
        document.getElementById("welcomeText").textContent="Welcome";
        document.getElementById("footer").textContent="📞 WhatsApp: 201080167099";
      }

    },3000);

  } else {
    document.getElementById("loginError").textContent =
      currentLang==="en" ? "Wrong data!" : "بيانات غلط";
  }
}

/* المنتجات */
const products = [
 {id:1,colors:["black","red"]},
 {id:2,colors:["white","pink"]},
 {id:3,colors:["brown","black"]},
 {id:4,colors:["black","blue"]},
 {id:5,colors:["pink","white"]},
 {id:6,colors:["gray","black"]},
 {id:7,colors:["red","white"]},
 {id:8,colors:["brown","beige"]},
 {id:9,colors:["blue","black"]},
 {id:10,colors:["pink","red"]}
];

function loadProducts(){
  let c = document.getElementById("productsContainer");
  c.innerHTML="";

  products.forEach(p=>{
    let color = p.colors[0];

    let imgs = [
      `bag${p.id}_${color}_front.jpg`,
      `bag${p.id}_${color}_side.jpg`,
      `bag${p.id}_${color}_back.jpg`,
      `bag${p.id}_${color}_open.jpg`
    ];

    c.innerHTML += `
    <div class="product" id="product${p.id}">
      <div class="gallery">
        ${imgs.map((img,i)=>`<img src="${img}" onclick="openImageGallery(${JSON.stringify(imgs)},${i})">`).join("")}
      </div>

      <div class="colors">
        ${p.colors.map(c=>`<span class="color" style="background:${c}" onclick="changeColor(${p.id},'${c}')"></span>`).join("")}
      </div>

      <h3>${currentLang==="en"?"Bag":"شنطة"} ${p.id}</h3>
      <p>${currentLang==="en"?"Price":"السعر"}: ${200+p.id*10} جنيه</p>

      <a href="https://wa.me/201080167099">
        <button>${currentLang==="en"?"Order":"اطلب الآن"}</button>
      </a>
    </div>`;
  });
}

/* تغيير اللون */
function changeColor(id,color){
  let gallery = document.querySelector(`#product${id} .gallery`);
  let imgs = [
    `bag${id}_${color}_front.jpg`,
    `bag${id}_${color}_side.jpg`,
    `bag${id}_${color}_back.jpg`,
    `bag${id}_${color}_open.jpg`
  ];
  gallery.innerHTML = imgs.map((img,i)=>`<img src="${img}" onclick="openImageGallery(${JSON.stringify(imgs)},${i})">`).join("");
}

/* المودال */
let currentImages=[],currentIndex=0;

function openImageGallery(images,i){
  currentImages=images;
  currentIndex=i;
  document.getElementById("myModal").style.display="block";
  document.getElementById("modalImg").src=images[i];
}

document.getElementById("closeModal").onclick=()=>document.getElementById("myModal").style.display="none";
document.getElementById("prev").onclick=()=>{currentIndex=(currentIndex-1+currentImages.length)%currentImages.length;document.getElementById("modalImg").src=currentImages[currentIndex];}
document.getElementById("next").onclick=()=>{currentIndex=(currentIndex+1)%currentImages.length;document.getElementById("modalImg").src=currentImages[currentIndex];}
</script>

</body>
</html>
