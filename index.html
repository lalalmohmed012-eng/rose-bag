<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Rose Bag</title>
<style>
body { font-family: Arial; background-color: #fff0f5; margin:0; text-align:center; }

header { background-color: #d63384; color:white; padding:20px; font-size:30px; }

#productsContainer { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:20px; padding:20px; }

.product { background:white; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); padding:15px; transition:0.3s; }
.product:hover { transform:translateY(-5px); }

.gallery { display:grid; grid-template-columns:repeat(2,1fr); gap:5px; }
.gallery img { width:100%; height:100px; object-fit:cover; border-radius:10px; cursor:pointer; transition:0.3s; }
.gallery img:hover { transform:scale(1.05); }

.colors { margin:10px 0; }
.color { width:20px; height:20px; display:inline-block; border-radius:50%; cursor:pointer; border:2px solid #fff; margin:2px; }
.active-color { border-color:#000; }

button { background-color:#d63384; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer; margin-top:10px; }

.footer { margin-top:30px; padding:20px; background:#d63384; color:white; }

.modal { display:none; position:fixed; z-index:1000; padding-top:60px; left:0; top:0; width:100%; height:100%; background-color: rgba(0,0,0,0.8); }
.modal img { display:block; margin:auto; max-width:80%; max-height:80%; border-radius:10px; }
#closeModal { position:absolute; top:10px; right:20px; font-size:30px; color:white; cursor:pointer; }
#prev,#next { position:absolute; top:50%; transform:translateY(-50%); font-size:40px; color:white; cursor:pointer; padding:10px; user-select:none; }
#prev { left:10px; }
#next { right:10px; }

/* Splash */
#splash { position:fixed; width:100%; height:100%; background:#fff0f5; display:flex; align-items:center; justify-content:center; z-index:9999; }
#splashLogo { width:200px; transition: transform 4s ease; }
#splash.show #splashLogo { transform:scale(1.5); }
</style>
</head>
<body>

<div id="splash">
  <img src="logo.jpg" alt="Rose Bag" id="splashLogo">
</div>

<header>🌸 Rose Bag 🌸</header>
<h2>أحدث الشنط</h2>

<div id="productsContainer"></div>

<div class="footer">📞 للتواصل واتساب: 201080167099</div>

<!-- Modal -->
<div id="myModal" class="modal">
    <span id="closeModal">&times;</span>
    <span id="prev">&#10094;</span>
    <span id="next">&#10095;</span>
    <img id="modalImg">
</div>

<script>
const products = [
    {id:1, colors:["black","red","blue"]},
    {id:2, colors:["black","white","red"]},
    {id:3, colors:["brown","black","beige"]},
    {id:4, colors:["black","red","pink"]},
    {id:5, colors:["blue","white","pink"]},
    {id:6, colors:["black","gray","brown"]},
    {id:7, colors:["red","pink","white"]},
    {id:8, colors:["black","brown","beige"]},
    {id:9, colors:["blue","gray","black"]},
    {id:10, colors:["pink","white","red"]}
];

let currentImages = [];
let currentIndex = 0;

function openImageGallery(images, index){
    currentImages = images;
    currentIndex = index;
    const modal = document.getElementById("myModal");
    modal.style.display="block";
    document.getElementById("modalImg").src = currentImages[currentIndex];
}

function changeColor(productId, color){
    const gallery = document.querySelector(`#product${productId} .gallery`);
    const images = [
        `bag${productId}_${color}_front.jpg`,
        `bag${productId}_${color}_side.jpg`,
        `bag${productId}_${color}_back.jpg`,
        `bag${productId}_${color}_open.jpg`
    ];
    gallery.innerHTML = images.map((img,i)=>`<img src="${img}" onclick="openImageGallery(${JSON.stringify(images)},${i})">`).join("");

    const colorSpans = document.querySelectorAll(`#colors${productId} .color`);
    colorSpans.forEach(span=>{
        span.classList.remove("active-color");
        if(span.style.backgroundColor === color) span.classList.add("active-color");
    });
}

// أسهم المودال
document.getElementById("prev").onclick = function(e){
    e.stopPropagation();
    currentIndex = (currentIndex-1+currentImages.length)%currentImages.length;
    document.getElementById("modalImg").src = currentImages[currentIndex];
}
document.getElementById("next").onclick = function(e){
    e.stopPropagation();
    currentIndex = (currentIndex+1)%currentImages.length;
    document.getElementById("modalImg").src = currentImages[currentIndex];
}

// إغلاق المودال
document.getElementById("closeModal").onclick = function(){ document.getElementById("myModal").style.display="none"; }
document.getElementById("modalImg").onclick = function(event){ event.stopPropagation(); }

window.onload = function(){
    const splash = document.getElementById("splash");
    splash.classList.add("show");
    setTimeout(()=>{ splash.style.display='none'; }, 4000);

    const container = document.getElementById("productsContainer");
    products.forEach(p=>{
        const defaultColor = p.colors[0];
        const images = [
            `bag${p.id}_${defaultColor}_front.jpg`,
            `bag${p.id}_${defaultColor}_side.jpg`,
            `bag${p.id}_${defaultColor}_back.jpg`,
            `bag${p.id}_${defaultColor}_open.jpg`
        ];
        container.innerHTML += `
        <div class="product" id="product${p.id}">
            <div class="gallery">
                ${images.map((img,i)=>`<img src="${img}" onclick='openImageGallery(${JSON.stringify(images)},${i})'>`).join("")}
            </div>
            <div class="colors" id="colors${p.id}">
                ${p.colors.map((c,index)=>`<span class="color ${index===0?'active-color':''}" style="background:${c}" onclick="changeColor(${p.id},'${c}')"></span>`).join("")}
            </div>
            <h3>شنطة ${p.id}</h3>
            <p>السعر: ${200 + p.id*10} جنيه</p>
            <a href="https://wa.me/201080167099?text=عايزة%20اطلب%20شنطة%20${p.id}">
                <button>اطلب الآن</button>
            </a>
        </div>`;
    });
};
</script>

</body>
</html>
